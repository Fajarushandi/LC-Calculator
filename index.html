<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lineage Farming Calculator</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  font-family:Arial, Helvetica, sans-serif;
}

html{
  overflow-x:hidden;
}

body{
  overflow-x:hidden;
}

body{
  background:
  radial-gradient(circle at top,#16294b 0%,#020617 60%);
  color:#fff;
  min-height:100vh;
  padding:18px;
}

.app{
  max-width:560px;
  margin:auto;
}

.card{
  background:#081225;
  border:1px solid rgba(255,255,255,.06);
  border-radius:32px;
  padding:22px;
  box-shadow:
  0 25px 60px rgba(0,0,0,.45),
  inset 0 1px 0 rgba(255,255,255,.03);
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:9px 15px;
  border-radius:999px;
  background:#172554;
  color:#93c5fd;
  font-size:12px;
  font-weight:800;
  margin-bottom:16px;
}

h1{
  font-size:31px;
  line-height:1.2;
  margin-bottom:6px;
}

.desc{
  color:#64748b;
  font-size:13px;
  margin-bottom:10px;
}

.section{
  margin-top:26px;
}

.sectionTitle{
  font-size:13px;
  color:#cbd5e1;
  font-weight:800;
  letter-spacing:.6px;
  margin-bottom:13px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.inputBox{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.label{
  font-size:13px;
  color:#cbd5e1;
  font-weight:700;
}

.input{
  width:100%;
  border:none;
  outline:none;
  border-radius:20px;
  padding:18px;
  background:#020617;
  border:1px solid #1e293b;
  color:#fff;
  font-size:16px;
  transition:.2s;
}

.input::placeholder{
  color:#334155;
}

.input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 4px rgba(59,130,246,.15);
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:30px;
}

button{
  border:none;
  padding:18px;
  border-radius:20px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  transition:.15s;
}

button:active{
  transform:scale(.98);
}

.primary{
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  box-shadow:0 12px 30px rgba(37,99,235,.35);
}

.secondary{
  background:#1e293b;
  color:white;
}

.result{
  display:none;
  margin-top:26px;
  border-radius:26px;
  overflow:hidden;
  background:#020617;
  border:1px solid #1e293b;
}

.resultTop{
  padding:22px;
  background:
  linear-gradient(135deg,#0f172a,#111827);
  border-bottom:1px solid #1e293b;
}

.resultTitle{
  font-size:23px;
  font-weight:800;
}

.resultTime{
  color:#93c5fd;
  margin-top:7px;
  font-size:14px;
}

.resultBody{
  padding:20px;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:18px;
}

.statCard{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:20px;
  padding:17px;
}

.statLabel{
  color:#94a3b8;
  font-size:12px;
  margin-bottom:8px;
}

.statValue{
  font-size:20px;
  font-weight:800;
}

.summary{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:20px;
  padding:18px;
  white-space:pre-line;
  line-height:1.9;
  margin-bottom:18px;
}

.copyArea{
  width:100%;
  min-height:180px;
  resize:none;
  border:none;
  outline:none;
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:20px;
  padding:16px;
  color:white;
  font-size:14px;
  line-height:1.8;
}

.copyBtn{
  width:100%;
  margin-top:14px;
  background:
  linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
}

.status{
  text-align:center;
  margin-top:12px;
  color:#86efac;
  font-size:13px;
  font-weight:700;
}

.credit{
  margin-top:22px;
  text-align:center;
  color:#475569;
  font-size:12px;
  font-weight:700;
}

@media(max-width:500px){

  .grid,
  .stats,
  .btns{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="app">

<div class="card">

<div class="badge">
LINEAGE CLASSIC
</div>

<h1>EXP & Adena Calculator</h1>

<div class="desc">
Made by Fajar
</div>

<div class="section">

<div class="sectionTitle">
CHARACTER
</div>

<div class="grid">

<div class="inputBox">
<div class="label">Character</div>
<input class="input" id="charName">
</div>

<div class="inputBox">
<div class="label">Level</div>
<input class="input" id="level" type="number">
</div>

</div>

</div>

<div class="section">

<div class="sectionTitle">
TIME
</div>

<div class="grid">

<div class="inputBox">
<div class="label">Jam Mulai</div>
<input class="input" id="startTime" type="time">
</div>

<div class="inputBox">
<div class="label">Jam Selesai</div>
<input class="input" id="endTime" type="time">
</div>

</div>

</div>

<div class="section">

<div class="sectionTitle">
EXP
</div>

<div class="grid">

<div class="inputBox">
<div class="label">EXP Awal</div>
<input class="input" id="startExp">
</div>

<div class="inputBox">
<div class="label">EXP Akhir</div>
<input class="input" id="endExp">
</div>

</div>

</div>

<div class="section">

<div class="sectionTitle">
ADENA
</div>

<div class="grid">

<div class="inputBox">
<div class="label">Adena Awal</div>
<input class="input money" id="startAdena">
</div>

<div class="inputBox">
<div class="label">Adena Akhir</div>
<input class="input money" id="endAdena">
</div>

</div>

</div>

<div class="btns">

<button class="primary" onclick="calculate()">
Hitung Sekarang
</button>

<button class="secondary" onclick="resetAll()">
Reset
</button>

</div>

<div class="result" id="result">

<div class="resultTop">

<div class="resultTitle" id="resName">
-
</div>

<div class="resultTime" id="resTime">
-
</div>

</div>

<div class="resultBody">

<div class="stats">

<div class="statCard">
<div class="statLabel">
EXP Gain
</div>

<div class="statValue" id="expGain">
+0.0000%
</div>
</div>

<div class="statCard">
<div class="statLabel">
EXP / Jam
</div>

<div class="statValue" id="expHour">
0.0000%
</div>
</div>

</div>

<div class="summary" id="summary"></div>

<textarea
class="copyArea"
id="copyText"
readonly
></textarea>

<button
class="copyBtn"
onclick="copyResult()">
Copy Hasil
</button>

<div class="status" id="status"></div>

</div>

</div>

</div>

</div>

<script>

let finalText = '';

function cleanNumber(value){

  return Number(
    String(value)
    .replace(/,/g,'')
    .trim()
  );

}

function formatExp(num){

  return Number(num).toFixed(4);

}

function formatMoney(num){

  return Math.round(num)
  .toLocaleString('en-US');

}

function getHours(start,end){

  const [sh,sm] =
  start.split(':').map(Number);

  const [eh,em] =
  end.split(':').map(Number);

  let startMin =
  sh * 60 + sm;

  let endMin =
  eh * 60 + em;

  if(endMin < startMin){

    endMin += 24 * 60;

  }

  return (
    endMin - startMin
  ) / 60;

}

document
.querySelectorAll('.money')
.forEach(input=>{

  input.addEventListener(
    'input',
    ()=>{

      let value =
      input.value
      .replace(/,/g,'')
      .replace(/\D/g,'');

      if(value === ''){

        input.value = '';
        return;

      }

      input.value =
      Number(value)
      .toLocaleString('en-US');

    }
  );

});

function calculate(){

  const charName =
  document
  .getElementById('charName')
  .value || '-';

  const level =
  document
  .getElementById('level')
  .value || '-';

  const startTime =
  document
  .getElementById('startTime')
  .value;

  const endTime =
  document
  .getElementById('endTime')
  .value;

  const startExp =
  cleanNumber(
    document
    .getElementById('startExp')
    .value
  );

  const endExp =
  cleanNumber(
    document
    .getElementById('endExp')
    .value
  );

  const startAdena =
  cleanNumber(
    document
    .getElementById('startAdena')
    .value
  );

  const endAdena =
  cleanNumber(
    document
    .getElementById('endAdena')
    .value
  );

  if(
    isNaN(startExp) ||
    isNaN(endExp)
  ){

    alert(
      'Isi EXP terlebih dahulu'
    );

    return;

  }

  if(
    isNaN(startAdena) ||
    isNaN(endAdena)
  ){

    alert(
      'Isi Adena terlebih dahulu'
    );

    return;

  }

  const hours =
  getHours(
    startTime,
    endTime
  );

  const expGain =
  endExp - startExp;

  const expPerHour =
  expGain / hours;

  const adenaGain =
  endAdena - startAdena;

  finalText =
`${charName} (${startTime} - ${endTime})
Lv ${level}
Exp ${formatExp(endExp)}%
Adena ${formatMoney(endAdena)}

Exp ${formatExp(expGain)}%
Exp/jam ${formatExp(expPerHour)}%
Adena +${formatMoney(adenaGain)}`;

  document
  .getElementById('copyText')
  .value = finalText;

  document
  .getElementById('resName')
  .innerText = charName;

  document
  .getElementById('resTime')
  .innerText =
  `${startTime} - ${endTime} • ${hours} Jam`;

  document
  .getElementById('expGain')
  .innerText =
  `+${formatExp(expGain)}%`;

  document
  .getElementById('expHour')
  .innerText =
  `${formatExp(expPerHour)}%`;

  document
  .getElementById('summary')
  .innerHTML =
`━━━━━━━━━━━━━━
Lv ${level}
Exp ${formatExp(endExp)}%
Adena ${formatMoney(endAdena)}

━━━━━━━━━━━━━━

Exp Gain : +${formatExp(expGain)}%
Exp/Jam  : ${formatExp(expPerHour)}%
Adena    : +${formatMoney(adenaGain)}`;

  document
  .getElementById('result')
  .style.display = 'block';

}

async function copyResult(){

  if(!finalText){
    return;
  }

  try{

    await navigator
    .clipboard
    .writeText(finalText);

  }catch{

    document.execCommand('copy');

  }

  document
  .getElementById('status')
  .innerText =
  'Berhasil dicopy ✓';

  setTimeout(()=>{

    document
    .getElementById('status')
    .innerText = '';

  },1500);

}

function resetAll(){

  document
  .querySelectorAll('input')
  .forEach(input=>{

    input.value = '';

  });

  document
  .getElementById('result')
  .style.display = 'none';

  document
  .getElementById('copyText')
  .value = '';

  document
  .getElementById('summary')
  .innerHTML = '';

  finalText = '';

}

</script>

</body>
</html>
