<!DOCTYPE html>
<html lang="id">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16294b">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Kalkulator EXP & Adena farming untuk Lineage Classic">

<title>Lineage Classic EXP & Adena Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* Fix: font Cinzel ke semua elemen interaktif */
body, input, button, textarea, select{
font-family:'Cinzel',serif;
}

body{
background:
radial-gradient(
circle at top,
#16294b 0%,
#020617 62%
);
color:#fff;
min-height:100vh;
padding:18px;
}

.app{
max-width:560px;
margin:0 auto;
}

.card{
position:relative;
overflow:hidden;
background:#081225;
border:1px solid rgba(255,255,255,.07);
border-radius:32px;
padding:22px;
box-shadow:
0 25px 60px rgba(0,0,0,.45),
inset 0 1px 0 rgba(255,255,255,.04);
}

.card::before{
content:'';
position:absolute;
inset:10px;
border:1px solid rgba(212,175,55,.15);
border-radius:24px;
pointer-events:none;
}

.badge{
display:inline-flex;
padding:9px 15px;
border-radius:999px;
background:rgba(212,175,55,.12);
color:#d4af37;
border:1px solid rgba(212,175,55,.35);
font-size:12px;
font-weight:800;
margin-bottom:16px;
}

h1{
font-size:31px;
line-height:1.18;
margin-bottom:6px;
color:#f8e7a1;
text-shadow:
0 0 12px rgba(212,175,55,.25);
}

.desc{
color:#64748b;
font-size:13px;
font-weight:700;
}

.section{
margin-top:26px;
}

.sectionTitle{
font-size:13px;
color:#cbd5e1;
font-weight:800;
letter-spacing:.6px;
margin-bottom:13px;
}

.inputBox{
display:flex;
flex-direction:column;
gap:8px;
margin-bottom:14px;
}

.label{
font-size:13px;
color:#cbd5e1;
font-weight:700;
}

.input{
width:100%;
border:none;
outline:none;
border-radius:20px;
padding:18px;
background:#020617;
border:1px solid #1e293b;
color:#fff;
font-size:16px;
transition:.2s;
}

.input:focus{
border-color:#d4af37;
box-shadow:
0 0 0 4px rgba(212,175,55,.15);
}

/* Fix: visual error state di input */
.input.error{
border-color:#ef4444;
box-shadow:0 0 0 4px rgba(239,68,68,.15);
}

.fieldError{
color:#f87171;
font-size:11px;
font-weight:700;
margin-top:2px;
min-height:14px;
display:block;
}

.btns{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:30px;
}

button{
border:none;
padding:18px;
border-radius:20px;
font-size:16px;
font-weight:800;
cursor:pointer;
transition:.15s;
}

button:active{
transform:scale(.98);
}

.primary{
background:
linear-gradient(
135deg,
#b8860b,
#d4af37
);
color:#fff;
box-shadow:
0 12px 30px rgba(212,175,55,.25);
}

.secondary{
background:#1e293b;
color:white;
}

.toggleBox{
display:flex;
align-items:center;
gap:10px;
background:#020617;
border:1px solid #1e293b;
border-radius:18px;
padding:14px 16px;
color:#e2e8f0;
font-size:14px;
font-weight:800;
margin-top:14px;
}

.toggleBox input{
width:18px;
height:18px;
accent-color:#d4af37;
}

/* Fix: result pakai animasi fade+slide masuk */
.result{
display:none;
margin-top:26px;
border-radius:26px;
overflow:hidden;
background:#020617;
border:1px solid #1e293b;
opacity:0;
transform:translateY(12px);
transition:opacity .3s ease, transform .3s ease;
}

.result.visible{
opacity:1;
transform:translateY(0);
}

.resultTop{
padding:22px;
background:
linear-gradient(
135deg,
#0f172a,
#111827
);
border-bottom:1px solid #1e293b;
}

.resultTitle{
font-size:23px;
font-weight:800;
}

.resultTime{
color:#d4af37;
margin-top:7px;
font-size:14px;
}

.resultBody{
padding:20px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:18px;
}

.statCard{
background:#0f172a;
border:1px solid #1e293b;
border-radius:20px;
padding:17px;
}

.statLabel{
color:#94a3b8;
font-size:12px;
margin-bottom:8px;
}

.statValue{
font-size:20px;
font-weight:800;
word-break:break-word;
}

/* Fix: warna merah kalau adena/exp negatif */
.statValue.negative{
color:#f87171;
}

.copyArea{
width:100%;
min-height:185px;
resize:none;
border:none;
outline:none;
background:#0f172a;
border:1px solid #1e293b;
border-radius:20px;
padding:16px;
color:white;
font-size:14px;
line-height:1.8;
}

.copyBtn{
width:100%;
margin-top:14px;
background:
linear-gradient(
135deg,
#16a34a,
#22c55e
);
color:white;
}

.status{
min-height:18px;
text-align:center;
margin-top:12px;
color:#86efac;
font-size:13px;
font-weight:700;
}

/* HISTORY */

.historyWrap{
margin-top:26px;
}

.historyHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.historyCard{
background:#0f172a;
border:1px solid #1e293b;
border-radius:20px;
padding:14px;
margin-bottom:10px;
position:relative;
}

.historyCard:first-child{
border-color:#d4af37;
box-shadow:0 0 15px rgba(212,175,55,.12);
}

.historyName{
font-weight:800;
color:#f8e7a1;
margin-bottom:5px;
}

.historyDate{
font-size:12px;
color:#94a3b8;
margin-bottom:8px;
}

/* Fix: tombol hapus per-item */
.deleteBtn{
position:absolute;
top:12px;
right:12px;
background:rgba(239,68,68,.15);
border:1px solid rgba(239,68,68,.3);
border-radius:10px;
color:#f87171;
font-size:11px;
font-weight:800;
padding:5px 10px;
cursor:pointer;
transition:.15s;
}

.deleteBtn:hover{
background:rgba(239,68,68,.3);
}

.adenaNote{
font-size:11px;
color:#94a3b8;
margin-top:4px;
font-weight:700;
}

@media(max-width:500px){

.btns{
grid-template-columns:1fr;
}

.card{
padding:20px;
border-radius:28px;
}

h1{
font-size:28px;
}

}

@media(prefers-reduced-motion:reduce){
.result{
transition:none;
}
}

</style>
</head>
<body>
<div class="app">
<div class="card">
<div class="badge">LINEAGE CLASSIC</div>
<h1>EXP & Adena Calculator</h1>
<div class="desc">Made by Fajar</div>

<div class="section">
<div class="sectionTitle">CHARACTER</div>
<div class="inputBox">
  <div class="label">Character</div>
  <input class="input" id="charName" autocomplete="off">
  <span class="fieldError" id="errCharName"></span>
</div>
<div class="inputBox">
  <div class="label">Level</div>
  <input class="input" id="level" type="number" inputmode="numeric" min="1" autocomplete="off">
  <span class="fieldError" id="errLevel"></span>
</div>
</div>

<div class="section">
<div class="sectionTitle">TIME</div>
<div class="inputBox">
  <div class="label">Jam Mulai</div>
  <input class="input" id="startTime" type="time">
  <span class="fieldError" id="errTime"></span>
</div>
<div class="inputBox">
  <div class="label">Jam Selesai</div>
  <input class="input" id="endTime" type="time">
</div>
</div>

<div class="section">
<div class="sectionTitle">EXP & ADENA</div>
<div class="inputBox">
  <div class="label">EXP Awal</div>
  <input class="input expInput" id="startExp" inputmode="decimal" autocomplete="off">
  <span class="fieldError" id="errStartExp"></span>
</div>
<div class="inputBox">
  <div class="label">Adena Awal</div>
  <input class="input money" id="startAdena" inputmode="decimal" autocomplete="off">
  <span class="fieldError" id="errStartAdena"></span>
</div>
<div class="inputBox">
  <div class="label">EXP Akhir</div>
  <input class="input expInput" id="endExp" inputmode="decimal" autocomplete="off">
  <span class="fieldError" id="errEndExp"></span>
</div>
<div class="inputBox">
  <div class="label">Adena Akhir</div>
  <input class="input money" id="endAdena" inputmode="decimal" autocomplete="off">
  <span class="fieldError" id="errEndAdena"></span>
</div>
<div class="toggleBox"><input type="checkbox" id="forceLevelUp"><span>Paksa Level Up +1</span></div>
<div class="toggleBox"><input type="checkbox" id="includeStart"><span>Include Start EXP & Adena in Copy</span></div>
</div>

<div class="btns">
<button class="primary" onclick="calculate()">Hitung Sekarang</button>
<button class="secondary" onclick="resetAll()">Reset</button>
</div>

<div class="result" id="result">
<div class="resultTop">
<div class="resultTitle" id="resName">-</div>
<div class="resultTime" id="resTime">-</div>
</div>
<div class="resultBody">
<div class="stats">
<div class="statCard"><div class="statLabel">EXP Gain</div><div class="statValue" id="expGain">0.0000%</div></div>
<div class="statCard"><div class="statLabel">EXP / Jam</div><div class="statValue" id="expHour">0.0000%</div></div>
</div>
<textarea class="copyArea" id="copyText" readonly></textarea>
<button class="copyBtn" onclick="copyResult()">Copy Hasil</button>
<div class="status" id="status"></div>
</div>
</div>

</div>

<div class="historyWrap">

<div class="historyHeader">
<div class="sectionTitle">FARMING HISTORY</div>
<button class="secondary" onclick="clearHistory()" style="padding:10px 14px;font-size:12px;">Clear All</button>
</div>

<div id="historyList">
<div class="historyCard">Belum ada riwayat farming</div>
</div>

</div>

</div>
</div>

<script>
let finalText = '';
const $ = id => document.getElementById(id);

function cleanNumber(value){
  const cleaned = String(value||'').replace(/,/g,'').replace(/[^\d.]/g,'').trim();
  if(cleaned==='') return NaN;
  return Number(cleaned);
}

function formatExp(num){ return Number(num).toFixed(4); }
function formatMoney(num){ return Number(num).toLocaleString('en-US'); }
function formatSignedMoney(num){ return (num>=0?'+':'-') + formatMoney(Math.abs(num)); }
function formatSignedExp(num){ return (num>=0?'+':'-') + formatExp(Math.abs(num)) + '%'; }

function getHours(start,end){
  if(!start||!end) return NaN;
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  let startMin = sh*60 + sm;
  let endMin = eh*60 + em;
  if(endMin<=startMin) endMin += 24*60;
  return (endMin - startMin)/60;
}

function formatHours(hours){
  if(!Number.isFinite(hours)) return '-';
  const h = Math.floor(hours);
  const m = Math.round((hours - h)*60);
  if(h===0) return `${m} Menit`;
  if(m===0) return `${h} Jam`;
  return `${h} Jam ${m} Menit`;
}

// Format input Adena ribuan otomatis
document.querySelectorAll('.money').forEach(input=>{
  input.addEventListener('input',()=>{
    let numeric = input.value.replace(/[^\d]/g,'');
    if(numeric===''){ input.value=''; return; }
    input.value = Number(numeric).toLocaleString('en-US');
  });
});

// Input EXP
document.querySelectorAll('.expInput').forEach(input=>{
  input.addEventListener('input',()=>{
    input.value = input.value.replace(/,/g,'.').replace(/[^\d.]/g,'').replace(/(\..*)\./g,'$1');
  });
});

// Clear error state on focus
document.querySelectorAll('.input').forEach(input=>{
  input.addEventListener('focus',()=>{
    input.classList.remove('error');
  });
});

function showError(inputId, errId, msg){
  const el = $(inputId);
  const err = $(errId);
  if(el) el.classList.add('error');
  if(err) err.innerText = msg;
}

function clearErrors(){
  document.querySelectorAll('.input').forEach(el => el.classList.remove('error'));
  document.querySelectorAll('.fieldError').forEach(el => el.innerText = '');
}

function calculate(){
  $('status').innerText='';
  clearErrors();

  const charName = $('charName').value.trim() || '-';
  const levelRaw = $('level').value.trim();
  const startTime = $('startTime').value;
  const endTime = $('endTime').value;
  const startExpRaw = $('startExp').value.replace(/,/g,'');
  const endExpRaw = $('endExp').value.replace(/,/g,'');
  const startAdenaRaw = $('startAdena').value.replace(/,/g,'');
  const endAdenaRaw = $('endAdena').value.replace(/,/g,'');

  const startExp = cleanNumber(startExpRaw);
  const endExp = cleanNumber(endExpRaw);

  // Fix: validasi adena wajib diisi
  const startAdenaStr = $('startAdena').value.trim();
  const endAdenaStr = $('endAdena').value.trim();
  const startAdena = cleanNumber(startAdenaRaw);
  const endAdena = cleanNumber(endAdenaRaw);

  let hasError = false;

  if(levelRaw===''){
    showError('level','errLevel','Level wajib diisi');
    hasError=true;
  } else {
    const level = Number(levelRaw);
    if(!Number.isInteger(level) || level < 1){
      showError('level','errLevel','Level harus angka valid (min 1)');
      hasError=true;
    }
  }

  if(!startTime || !endTime){
    showError('startTime','errTime','Jam mulai & selesai wajib diisi');
    hasError=true;
  }

  if(isNaN(startExp)){
    showError('startExp','errStartExp','EXP awal wajib diisi');
    hasError=true;
  } else if(startExp < 0 || startExp > 100){
    showError('startExp','errStartExp','EXP harus antara 0–100');
    hasError=true;
  }

  if(isNaN(endExp)){
    showError('endExp','errEndExp','EXP akhir wajib diisi');
    hasError=true;
  } else if(endExp < 0 || endExp > 100){
    showError('endExp','errEndExp','EXP harus antara 0–100');
    hasError=true;
  }

  if(startAdenaStr === '' || isNaN(startAdena)){
    showError('startAdena','errStartAdena','Adena awal wajib diisi');
    hasError=true;
  }

  if(endAdenaStr === '' || isNaN(endAdena)){
    showError('endAdena','errEndAdena','Adena akhir wajib diisi');
    hasError=true;
  }

  if(hasError) return;

  const hours = getHours(startTime, endTime);
  if(!Number.isFinite(hours)){
    showError('startTime','errTime','Format jam tidak valid');
    return;
  }

  const level = Number(levelRaw);
  const forceLevelUp = $('forceLevelUp')?.checked === true;
  const includeStart = $('includeStart')?.checked === true;
  const isLevelUp = forceLevelUp || endExp < startExp;
  const expGain = isLevelUp ? (100 - startExp) + endExp : endExp - startExp;
  const expPerHour = expGain / hours;
  const adenaGain = endAdena - startAdena;
  const levelText = isLevelUp ? `Lv ${level} → ${level+1}` : `Lv ${level}`;

  finalText = `${charName} (${startTime} - ${endTime})
${levelText}
Exp ${formatExp(endExp)}%
Adena ${formatMoney(endAdena)}`;

  if(includeStart){
    finalText += `

Started with:
Exp ${formatExp(startExp)}%
Adena ${formatMoney(startAdena)}`;
  }

  finalText += `

Gain:
Exp ${formatSignedExp(expGain)}
Exp/jam ${formatSignedExp(expPerHour)}
Adena ${formatSignedMoney(adenaGain)}`;

  // Fix: warna negatif di stat cards
  const expGainEl = $('expGain');
  const expHourEl = $('expHour');
  expGainEl.innerText = formatSignedExp(expGain);
  expHourEl.innerText = formatSignedExp(expPerHour);
  expGainEl.classList.toggle('negative', expGain < 0);
  expHourEl.classList.toggle('negative', expPerHour < 0);

  $('copyText').value = finalText;
  $('resName').innerText = charName;
  $('resTime').innerText = `${startTime} - ${endTime} • ${formatHours(hours)}`;

  // Fix: animasi fade+slide
  const resultEl = $('result');
  resultEl.style.display = 'block';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      resultEl.classList.add('visible');
    });
  });
  setTimeout(()=>{ resultEl.scrollIntoView({behavior:'smooth',block:'start'}); }, 80);

  saveHistory({
    id: Date.now(),
    date: new Date().toLocaleString('id-ID'),
    startTime,
    endTime,
    duration: formatHours(hours),
    name: charName,
    level: levelText,
    expGain: formatSignedExp(expGain),
    adenaGain: formatSignedMoney(adenaGain)
  });
}

async function copyResult(){
  if(!finalText){ alert('Belum ada hasil'); return; }
  try { await navigator.clipboard.writeText(finalText); }
  catch{
    const textArea = $('copyText');
    textArea.focus(); textArea.select();
    document.execCommand('copy');
  }
  $('status').innerText='Berhasil dicopy ✓';
  setTimeout(()=>{ $('status').innerText=''; }, 1500);
}

function resetAll(){
  document.querySelectorAll('input').forEach(input=>{
    if(input.type==='checkbox'){ input.checked=false; }
    else { input.value=''; }
  });
  clearErrors();
  finalText='';
  const resultEl = $('result');
  resultEl.classList.remove('visible');
  setTimeout(()=>{ resultEl.style.display='none'; }, 300);
  $('copyText').value='';
  $('status').innerText='';
  window.scrollTo({ top:0, behavior:'smooth' });
}

function saveHistory(data){
  let history = JSON.parse(localStorage.getItem('lc_history') || '[]');
  const last = history[0];
  if(
    last &&
    last.name === data.name &&
    last.startTime === data.startTime &&
    last.endTime === data.endTime &&
    last.expGain === data.expGain &&
    last.adenaGain === data.adenaGain
  ){ return; }
  history.unshift(data);
  if(history.length > 20) history = history.slice(0,20);
  localStorage.setItem('lc_history', JSON.stringify(history));
  renderHistory();
}

// Fix: hapus per-item
function deleteHistoryItem(id){
  let history = JSON.parse(localStorage.getItem('lc_history') || '[]');
  history = history.filter(item => item.id !== id);
  localStorage.setItem('lc_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  const list = document.getElementById('historyList');
  if(!list) return;
  const history = JSON.parse(localStorage.getItem('lc_history') || '[]');

  if(history.length===0){
    list.innerHTML = `<div class="historyCard">Belum ada riwayat farming</div>`;
    return;
  }

  list.innerHTML = history.map((item, idx) => `
    <div class="historyCard">
      <button class="deleteBtn" onclick="deleteHistoryItem(${item.id})">Hapus</button>
      <div class="historyName">${item.name}</div>
      <div class="historyDate">🕒 ${item.startTime} - ${item.endTime}</div>
      <div class="historyDate">⏳ ${item.duration}</div>
      <div style="margin-top:8px;font-weight:700;">${item.level}</div>
      <div>EXP ${item.expGain}</div>
      <div>Adena ${item.adenaGain}${item.adenaGain.startsWith('-') ? '<div class="adenaNote">⚠ Adena berkurang (beli item / mati?)</div>' : ''}</div>
      <div style="margin-top:8px;font-size:11px;color:#64748b;">${item.date}</div>
    </div>
  `).join('');
}

function clearHistory(){
  if(!confirm('Hapus semua riwayat farming?')) return;
  localStorage.removeItem('lc_history');
  renderHistory();
}

renderHistory();
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
</body>
</html>
