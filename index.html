<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lineage Farming Calculator</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  font-family:Arial, Helvetica, sans-serif;
}

html{
  overflow-x:hidden;
}

body{
  overflow-x:hidden;
  background:
    radial-gradient(circle at top,#16294b 0%,#020617 62%);
  color:#fff;
  min-height:100vh;
  padding:18px;
}

.app{
  width:100%;
  max-width:560px;
  margin:0 auto;
}

.card{
  width:100%;
  background:#081225;
  border:1px solid rgba(255,255,255,.07);
  border-radius:32px;
  padding:22px;
  box-shadow:
    0 25px 60px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.04);
}

.badge{
  display:inline-flex;
  padding:9px 15px;
  border-radius:999px;
  background:#172554;
  color:#93c5fd;
  font-size:12px;
  font-weight:800;
  margin-bottom:16px;
}

h1{
  font-size:31px;
  line-height:1.18;
  margin-bottom:6px;
}

.desc{
  color:#64748b;
  font-size:13px;
  font-weight:700;
}

.section{
  margin-top:26px;
}

.sectionTitle{
  font-size:13px;
  color:#cbd5e1;
  font-weight:800;
  letter-spacing:.6px;
  margin-bottom:13px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.inputBox{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.label{
  font-size:13px;
  color:#cbd5e1;
  font-weight:700;
}

.input{
  width:100%;
  border:none;
  outline:none;
  border-radius:20px;
  padding:18px;
  background:#020617;
  border:1px solid #1e293b;
  color:#fff;
  font-size:16px;
  transition:.2s;
}

.input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 4px rgba(59,130,246,.15);
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:30px;
}

button{
  border:none;
  padding:18px;
  border-radius:20px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  transition:.15s;
}

button:active{
  transform:scale(.98);
}

.primary{
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  box-shadow:0 12px 30px rgba(37,99,235,.35);
}

.secondary{
  background:#1e293b;
  color:white;
}

.result{
  display:none;
  margin-top:26px;
  border-radius:26px;
  overflow:hidden;
  background:#020617;
  border:1px solid #1e293b;
}

.resultTop{
  padding:22px;
  background:linear-gradient(135deg,#0f172a,#111827);
  border-bottom:1px solid #1e293b;
}

.resultTitle{
  font-size:23px;
  font-weight:800;
}

.resultTime{
  color:#93c5fd;
  margin-top:7px;
  font-size:14px;
}

.resultBody{
  padding:20px;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:18px;
}

.statCard{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:20px;
  padding:17px;
}

.statLabel{
  color:#94a3b8;
  font-size:12px;
  margin-bottom:8px;
}

.statValue{
  font-size:20px;
  font-weight:800;
  word-break:break-word;
}

.copyArea{
  width:100%;
  min-height:185px;
  resize:none;
  border:none;
  outline:none;
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:20px;
  padding:16px;
  color:white;
  font-size:14px;
  line-height:1.8;
}

.copyBtn{
  width:100%;
  margin-top:14px;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
}

.status{
  min-height:18px;
  text-align:center;
  margin-top:12px;
  color:#86efac;
  font-size:13px;
  font-weight:700;
}

@media(max-width:500px){
  .grid,
  .stats,
  .btns{
    grid-template-columns:1fr;
  }

  body{
    padding:14px;
  }

  .card{
    padding:20px;
    border-radius:28px;
  }

  h1{
    font-size:28px;
  }
}
</style>
</head>

<body>

<div class="app">
  <div class="card">

    <div class="badge">LINEAGE CLASSIC</div>

    <h1>EXP & Adena Calculator</h1>
    <div class="desc">Made by Fajar</div>

    <div class="section">
      <div class="sectionTitle">CHARACTER</div>

      <div class="grid">
        <div class="inputBox">
          <div class="label">Character</div>
          <input class="input" id="charName" autocomplete="off">
        </div>

        <div class="inputBox">
          <div class="label">Level</div>
          <input class="input" id="level" type="number" inputmode="numeric">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sectionTitle">TIME</div>

      <div class="grid">
        <div class="inputBox">
          <div class="label">Jam Mulai</div>
          <input class="input" id="startTime" type="time">
        </div>

        <div class="inputBox">
          <div class="label">Jam Selesai</div>
          <input class="input" id="endTime" type="time">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sectionTitle">EXP</div>

      <div class="grid">
        <div class="inputBox">
          <div class="label">EXP Awal</div>
          <input class="input expInput" id="startExp" inputmode="decimal" autocomplete="off">
        </div>

        <div class="inputBox">
          <div class="label">EXP Akhir</div>
          <input class="input expInput" id="endExp" inputmode="decimal" autocomplete="off">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sectionTitle">ADENA</div>

      <div class="grid">
        <div class="inputBox">
          <div class="label">Adena Awal</div>
          <input class="input money" id="startAdena" inputmode="numeric" autocomplete="off">
        </div>

        <div class="inputBox">
          <div class="label">Adena Akhir</div>
          <input class="input money" id="endAdena" inputmode="numeric" autocomplete="off">
        </div>
      </div>
    </div>

    <div class="btns">
      <button class="primary" onclick="calculate()">Hitung Sekarang</button>
      <button class="secondary" onclick="resetAll()">Reset</button>
    </div>

    <div class="result" id="result">
      <div class="resultTop">
        <div class="resultTitle" id="resName">-</div>
        <div class="resultTime" id="resTime">-</div>
      </div>

      <div class="resultBody">
        <div class="stats">
          <div class="statCard">
            <div class="statLabel">EXP Gain</div>
            <div class="statValue" id="expGain">0.0000%</div>
          </div>

          <div class="statCard">
            <div class="statLabel">EXP / Jam</div>
            <div class="statValue" id="expHour">0.0000%</div>
          </div>
        </div>

        <textarea class="copyArea" id="copyText" readonly></textarea>

        <button class="copyBtn" onclick="copyResult()">Copy Hasil</button>

        <div class="status" id="status"></div>
      </div>
    </div>

  </div>
</div>

<script>
let finalText = '';

const $ = id => document.getElementById(id);

function cleanNumber(value){
  const cleaned = String(value || '')
    .replace(/,/g,'')
    .replace(/\s/g,'')
    .trim();

  if(cleaned === '') return NaN;

  return Number(cleaned);
}

function formatExp(num){
  return Number(num).toFixed(4);
}

function formatMoney(num){
  return Math.round(num).toLocaleString('en-US');
}

function formatSignedMoney(num){
  const sign = num >= 0 ? '+' : '-';
  return sign + formatMoney(Math.abs(num));
}

function formatSignedExp(num){
  const sign = num >= 0 ? '+' : '-';
  return sign + formatExp(Math.abs(num)) + '%';
}

function getHours(start,end){
  if(!start || !end) return NaN;

  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);

  let startMin = sh * 60 + sm;
  let endMin = eh * 60 + em;

  if(endMin < startMin){
    endMin += 24 * 60;
  }

  const diff = (endMin - startMin) / 60;

  if(diff <= 0) return NaN;

  return diff;
}

function formatHours(hours){
  if(!Number.isFinite(hours)) return '-';

  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);

  if(m === 0) return `${h} Jam`;
  if(h === 0) return `${m} Menit`;

  return `${h} Jam ${m} Menit`;
}

document.querySelectorAll('.money').forEach(input=>{
  input.addEventListener('input',()=>{
    let value = input.value
      .replace(/,/g,'')
      .replace(/\D/g,'');

    if(value === ''){
      input.value = '';
      return;
    }

    input.value = Number(value).toLocaleString('en-US');
  });
});

document.querySelectorAll('.expInput').forEach(input=>{
  input.addEventListener('input',()=>{
    input.value = input.value
      .replace(/,/g,'.')
      .replace(/[^\d.]/g,'')
      .replace(/(\..*)\./g,'$1');
  });
});

function calculate(){
  const charName = $('charName').value.trim() || '-';
  const level = $('level').value.trim() || '-';
  const startTime = $('startTime').value;
  const endTime = $('endTime').value;

  const startExp = cleanNumber($('startExp').value);
  const endExp = cleanNumber($('endExp').value);
  const startAdena = cleanNumber($('startAdena').value);
  const endAdena = cleanNumber($('endAdena').value);

  if(!startTime || !endTime){
    alert('Isi jam mulai & jam selesai');
    return;
  }

  if(isNaN(startExp) || isNaN(endExp)){
    alert('Isi EXP awal & EXP akhir');
    return;
  }

  if(isNaN(startAdena) || isNaN(endAdena)){
    alert('Isi Adena awal & Adena akhir');
    return;
  }

  const hours = getHours(startTime,endTime);

  if(!Number.isFinite(hours)){
    alert('Jam mulai dan jam selesai tidak boleh sama');
    return;
  }

  const expGain = endExp - startExp;
  const expPerHour = expGain / hours;
  const adenaGain = endAdena - startAdena;

  finalText =
`${charName} (${startTime} - ${endTime})
Lv ${level}
Exp ${formatExp(endExp)}%
Adena ${formatMoney(endAdena)}

Exp ${formatExp(expGain)}%
Exp/jam ${formatExp(expPerHour)}%
Adena ${formatSignedMoney(adenaGain)}`;

  $('copyText').value = finalText;
  $('resName').innerText = charName;
  $('resTime').innerText = `${startTime} - ${endTime} • ${formatHours(hours)}`;
  $('expGain').innerText = formatSignedExp(expGain);
  $('expHour').innerText = `${formatExp(expPerHour)}%`;

  $('result').style.display = 'block';

  setTimeout(()=>{
    $('result').scrollIntoView({
      behavior:'smooth',
      block:'start'
    });
  },80);
}

async function copyResult(){
  if(!finalText){
    alert('Belum ada hasil');
    return;
  }

  try{
    await navigator.clipboard.writeText(finalText);
  }catch{
    const textArea = $('copyText');
    textArea.focus();
    textArea.select();
    document.execCommand('copy');
  }

  $('status').innerText = 'Berhasil dicopy ✓';

  setTimeout(()=>{
    $('status').innerText = '';
  },1500);
}

function resetAll(){
  document.querySelectorAll('input').forEach(input=>{
    input.value = '';
  });

  finalText = '';

  $('result').style.display = 'none';
  $('copyText').value = '';
  $('status').innerText = '';
}
</script>

</body>
</html>
