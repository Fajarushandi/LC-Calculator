<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lineage Classic EXP & Adena Calculator</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top,#16294b 0%,#020617 62%);
  color: #fff;
  padding: 18px;
  min-height: 100vh;
}
.app { max-width: 560px; margin: 0 auto; }
.card {
  background: #081225;
  border-radius: 28px;
  padding: 22px;
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 25px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
}
h1 { font-size: 28px; margin-bottom: 6px; }
.desc { color: #64748b; font-size: 13px; font-weight: 700; }
.section { margin-top: 26px; }
.sectionTitle { font-size: 13px; color: #cbd5e1; font-weight: 800; letter-spacing: 0.6px; margin-bottom: 13px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.inputBox { display: flex; flex-direction: column; gap: 8px; }
.inputBox label { font-size: 13px; color: #cbd5e1; font-weight: 700; }
.inputBox input {
  padding: 14px; border-radius: 20px; border: 1px solid #1e293b;
  background: #020617; color: #fff; font-size: 16px; outline: none;
}
.inputBox input:focus {
  border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,.15);
}
.btns { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 30px; }
button { border: none; padding: 16px; border-radius: 20px; font-weight: 800; cursor: pointer; }
.primary { background: linear-gradient(135deg,#2563eb,#3b82f6); color: #fff; }
.secondary { background: #1e293b; color: #fff; }
.result { display: none; margin-top: 26px; border-radius: 26px; overflow: hidden; background: #020617; border: 1px solid #1e293b; }
.resultTop { padding: 22px; background: linear-gradient(135deg,#0f172a,#111827); border-bottom: 1px solid #1e293b; }
.resultTitle { font-size: 23px; font-weight: 800; }
.resultTime { color: #93c5fd; margin-top: 7px; font-size: 14px; }
.resultBody { padding: 20px; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
.statCard { background: #0f172a; border:1px solid #1e293b; border-radius:20px; padding:17px; }
.statLabel { color: #94a3b8; font-size:12px; margin-bottom:8px; }
.statValue { font-size:20px; font-weight:800; word-break:break-word; }
.copyArea { width:100%; min-height:120px; resize:none; border-radius:20px; padding:12px; background:#0f172a; border:1px solid #1e293b; color:#fff; font-size:14px; }
.copyBtn { width:100%; margin-top:12px; background:linear-gradient(135deg,#16a34a,#22c55e); color:#fff; padding:12px; border-radius:18px; font-weight:800; cursor:pointer; }
.status { text-align:center; margin-top:12px; color:#86efac; font-weight:700; font-size:13px; }
.miniSection { margin-top:16px; }
.toggleBox { display:flex; align-items:center; gap:10px; background:#020617; border:1px solid #1e293b; border-radius:18px; padding:14px 16px; color:#e2e8f0; font-size:14px; font-weight:800; }
.toggleBox input { width:18px; height:18px; accent-color:#3b82f6; }
.hint { margin-top:8px; color:#64748b; font-size:12px; line-height:1.5; }
@media(max-width:500px){ .grid, .stats, .btns { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="badge">LINEAGE CLASSIC</div>
    <h1>EXP & Adena Calculator</h1>
    <div class="desc">Made by Fajar</div>

    <!-- CHARACTER -->
    <div class="section">
      <div class="sectionTitle">CHARACTER</div>
      <div class="grid">
        <div class="inputBox">
          <label>Character</label>
          <input type="text" id="charName" autocomplete="off">
        </div>
        <div class="inputBox">
          <label>Level</label>
          <input type="number" id="level" min="1">
        </div>
      </div>
    </div>

    <!-- TIME -->
    <div class="section">
      <div class="sectionTitle">TIME</div>
      <div class="grid">
        <div class="inputBox">
          <label>Jam Mulai</label>
          <input type="time" id="startTime">
        </div>
        <div class="inputBox">
          <label>Jam Selesai</label>
          <input type="time" id="endTime">
        </div>
      </div>
    </div>

    <!-- EXP & ADENA -->
    <div class="section">
      <div class="sectionTitle">EXP & Adena</div>
      <div class="grid">
        <!-- KIRI: Awal -->
        <div>
          <div class="inputBox">
            <label>EXP Awal</label>
            <input class="input expInput" id="startExp" type="number" step="0.0001" min="0" max="100">
          </div>
          <div class="inputBox" style="margin-top:14px;">
            <label>Adena Awal</label>
            <input class="input money" id="startAdena" type="text" autocomplete="off">
          </div>
        </div>

        <!-- KANAN: Akhir -->
        <div>
          <div class="inputBox">
            <label>EXP Akhir</label>
            <input class="input expInput" id="endExp" type="number" step="0.0001" min="0" max="100">
          </div>
          <div class="inputBox" style="margin-top:14px;">
            <label>Adena Akhir</label>
            <input class="input money" id="endAdena" type="text" autocomplete="off">
          </div>
        </div>
      </div>
    </div>

    <div class="section miniSection">
      <label class="toggleBox">
        <input type="checkbox" id="forceLevelUp">
        <span>Paksa Level Up +1</span>
      </label>
      <div class="hint">Kosongkan kalau normal. Sistem tetap auto level up kalau EXP akhir lebih kecil dari EXP awal.</div>
    </div>

    <!-- BUTTONS -->
    <div class="btns">
      <button class="primary" onclick="calculate()">Hitung Sekarang</button>
      <button class="secondary" onclick="resetAll()">Reset</button>
    </div>

    <!-- RESULT -->
    <div class="result" id="result">
      <div class="resultTop">
        <div class="resultTitle" id="resName">-</div>
        <div class="resultTime" id="resTime">-</div>
      </div>
      <div class="resultBody">
        <div class="stats">
          <div class="statCard">
            <div class="statLabel">EXP Gain</div>
            <div class="statValue" id="expGain">0.0000%</div>
          </div>
          <div class="statCard">
            <div class="statLabel">EXP / Jam</div>
            <div class="statValue" id="expHour">0.0000%</div>
          </div>
        </div>
        <textarea class="copyArea" id="copyText" readonly></textarea>
        <button class="copyBtn" onclick="copyResult()">Copy Hasil</button>
        <div class="status" id="status"></div>
      </div>
    </div>

  </div>
</div>

<script>
const $ = id=>document.getElementById(id);
let finalText='';

// FORMAT INPUT ADENA DENGAN KOMAw
document.querySelectorAll('.money').forEach(input=>{
  input.addEventListener('input',()=>{
    let value = input.value.replace(/\D/g,'');
    if(value===''){ input.value=''; return; }
    input.value = Number(value).toLocaleString('en-US');
  });
});

function cleanNumber(value){
  return Number(value.replace(/,/g,''));
}

function getHours(start,end){
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  let startMin=sh*60+sm, endMin=eh*60+em;
  if(endMin<=startMin) endMin+=24*60;
  return (endMin-startMin)/60;
}

function formatSigned(num,type='money'){return (num>=0?'+':'-')+(type==='money'?Math.round(num).toLocaleString():num.toFixed(4)+'%');}

function calculate(){
  const charName=$('charName').value.trim()||'-';
  const level=parseInt($('level').value);
  const startTime=$('startTime').value;
  const endTime=$('endTime').value;
  const startExp=parseFloat($('startExp').value);
  const endExp=parseFloat($('endExp').value);
  const startAdena=cleanNumber($('startAdena').value);
  const endAdena=cleanNumber($('endAdena').value);
  const forceLevelUp=$('forceLevelUp').checked;

  if(!level||level<1){alert('Level harus valid'); return;}
  if(!startTime||!endTime){alert('Isi jam mulai & selesai'); return;}
  if(isNaN(startExp)||isNaN(endExp)){alert('EXP harus valid'); return;}
  if(isNaN(startAdena)||isNaN(endAdena)){alert('Adena harus valid'); return;}

  const hours=getHours(startTime,endTime);
  if(!Number.isFinite(hours)){alert('Format jam tidak valid'); return;}

  const isLevelUp=forceLevelUp||endExp<startExp;
  const expGain=isLevelUp?(100-startExp)+endExp:endExp-startExp;
  const expPerHour=expGain/hours;
  const adenaGain=endAdena-startAdena;
  const levelText=isLevelUp?`Lv ${level} → ${level+1}`:`Lv ${level}`;

  finalText=`${charName} (${startTime}-${endTime})
${levelText}
Exp ${endExp.toFixed(4)}%
Adena ${endAdena.toLocaleString()}

Exp ${formatSigned(expGain,'exp')}
Exp/jam ${formatSigned(expPerHour,'exp')}
Adena ${formatSigned(adenaGain)}`;

  $('resName').innerText=charName;
  $('resTime').innerText=`${startTime} - ${endTime} • ${Math.floor(hours)} Jam ${Math.round((hours-Math.floor(hours))*60)} Menit`;
  $('expGain').innerText=formatSigned(expGain,'exp');
  $('expHour').innerText=formatSigned(expPerHour,'exp');
  $('copyText').value=finalText;
  $('result').style.display='block';
  setTimeout(()=>$('result').scrollIntoView({behavior:'smooth',block:'start'}),80);
}

async function copyResult(){
  if(!finalText){alert('Belum ada hasil'); return;}
  try{await navigator.clipboard.writeText(finalText);}
  catch{const t=$('copyText'); t.focus(); t.select(); document.execCommand('copy');}
  $('status').innerText='Berhasil dicopy ✓';
  setTimeout(()=>$('status').innerText='',1500);
}

function resetAll(){
  document.querySelectorAll('input').forEach(i=>i.value='');
  $('forceLevelUp').checked=false;
  finalText='';
  $('result').style.display='none';
  $('copyText').value='';
  $('status').innerText='';
}
</script>
</body>
</html>
